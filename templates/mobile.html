<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body { min-height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: none; font-family: -apple-system, "Noto Sans SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; font-size: 16px; -webkit-tap-highlight-color: transparent; }
input, button, select { font-family: inherit; outline: none; }
a { color: inherit; text-decoration: none; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }
.screen-center { display: none; position: fixed; inset: 0; z-index: 1; align-items: center; justify-content: center; }
.screen-center.active { display: flex; }

#screen-login { background: #f6f6f7; }
.login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 320px; }
.login-box h1 { text-align: center; margin-bottom: 24px; font-size: 24px; color: #3c3c43; }
.login-box h1 span { color: #e74c3c; }
.login-box label { display: block; margin-bottom: 6px; font-size: 13px; color: #8a8a8f; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d6; border-radius: 6px; background: #f6f6f7; color: #3c3c43; font-size: 16px; margin-bottom: 18px; }
.login-box input:focus { border-color: #e74c3c; }
.login-box button { width: 100%; padding: 12px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
.login-box button:active { background: #c0392b; }
.login-box .error { color: #e74c3c; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }

#screen-history { background: #1a1a2e; }
.history-header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #2a3a5c; display: flex; align-items: center; }
.history-header h2 { flex: 1; font-size: 16px; font-weight: 500; color: #e0e0e0; }
.history-header .logout-btn { background: none; border: 1px solid #2a3a5c; color: #888; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.history-input { padding: 12px 16px; display: flex; gap: 8px; border-bottom: 1px solid #2a3a5c; }
.history-input select { padding: 10px; border: 1px solid #2a3a5c; border-radius: 6px; background: #0f3460; color: #eee; font-size: 14px; -webkit-appearance: none; }
.history-input input { flex: 1; min-width: 0; padding: 10px 12px; border: 1px solid #2a3a5c; border-radius: 6px; background: #0f3460; color: #eee; font-size: 14px; }
.history-input button { padding: 10px 16px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; font-size: 14px; white-space: nowrap; cursor: pointer; }
.history-input button:active { background: #c0392b; }
.history-list {}
.history-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #1a2a4a; min-height: 60px; cursor: pointer; }
.history-item:active { background: #1a2a4a; }
.history-item .info { flex: 1; min-width: 0; }
.history-item .info .title { font-size: 15px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item .info .meta { font-size: 12px; color: #888; margin-top: 2px; }
.history-empty { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }

#screen-chapters { background: #1a1a2e; }
.chapter-header { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #2a3a5c; display: flex; align-items: center; gap: 8px; }
.chapter-header .back-btn { background: none; border: none; color: #e74c3c; font-size: 22px; cursor: pointer; padding: 4px; }
.chapter-header h2 { flex: 1; font-size: 15px; font-weight: 500; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chapter-list {}
.chapter-item { padding: 12px 16px; border-bottom: 1px solid #1a2a4a; font-size: 14px; color: #999; cursor: pointer; }
.chapter-item:active { background: #1a2a4a; color: #e0e0e0; }

#screen-reader { background: #f6f6f7; }
.reader-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 8px 16px; background: #e8e8ec; display: flex; align-items: center; gap: 8px; transition: transform 0.25s ease; }
.reader-header .back-btn { background: none; border: none; color: #e74c3c; font-size: 22px; cursor: pointer; padding: 4px; }
.reader-header .chap-title { flex: 1; font-size: 14px; color: #3c3c43; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reader-content { padding: 56px 16px 56px; transition: padding 0.25s ease; }
.reader-content .text { font-size: 20px; line-height: 1.8; color: #3c3c43; white-space: pre-wrap; word-wrap: break-word; }
.reader-content .text.show-sep::before { content: attr(data-title); display: block; font-size: 22px; font-weight: 600; color: #3c3c43; text-align: center; padding-bottom: 14px; margin-bottom: 14px; }
.reader-content .text.show-sep::after { content: "—— 本章结束 ——"; display: block; text-align: center; font-size: 13px; color: #999; padding-top: 16px; margin-top: 16px; }
.reader-nav { margin-top: 16px; padding-bottom: 16px; display: flex; gap: 12px; }
.reader-nav .nav-btn { flex: 1; padding: 12px; border: 1px solid #d1d1d6; border-radius: 6px; background: #fff; color: #3c3c43; font-size: 14px; cursor: pointer; text-align: center; }
.reader-nav .nav-btn:active { background: #e8e8ec; }
.reader-footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; border-top: 1px solid #d1d1d6; background: #e8e8ec; transition: transform 0.25s ease; }
.reader-footer button { flex: 1; padding: 14px; border: none; background: none; color: #3c3c43; font-size: 14px; cursor: pointer; text-align: center; }
.reader-footer button:active { background: #d8d8dc; }
.reader-footer button + button { border-left: 1px solid #d1d1d6; }
.reader-controls-hidden .reader-header { transform: translateY(-100%); pointer-events: none; }
.reader-controls-hidden .reader-footer { transform: translateY(100%); pointer-events: none; }
.reader-controls-hidden .reader-content { padding: 16px; }

.chapter-overlay { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; background: #1a1a2e; }
.chapter-overlay.active { display: flex; }
.overlay-header { padding: 12px 16px; background: #16213e; display: flex; align-items: center; border-bottom: 1px solid #2a3a5c; }
.overlay-header h3 { flex: 1; font-size: 15px; color: #e0e0e0; font-weight: 500; }
.overlay-header .close-btn { background: none; border: none; color: #8a8a8f; font-size: 22px; cursor: pointer; padding: 4px; }
.overlay-list { flex: 1; overflow-y: auto; }
.overlay-item { padding: 12px 16px; border-bottom: 1px solid #1a2a4a; font-size: 14px; color: #999; cursor: pointer; }
.overlay-item:active { background: #1a2a4a; color: #e0e0e0; }
.overlay-item.active { color: #e74c3c; }

.loading { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }

#screen-reader.night-mode { background: #0d0d1a; }
#screen-reader.night-mode .reader-header { background: #0f3460; }
#screen-reader.night-mode .reader-header .back-btn { color: #8a8a8f; }
#screen-reader.night-mode .reader-header .chap-title { color: #e0e0e0; }
#screen-reader.night-mode .reader-footer { background: #0f3460; border-top-color: #2a3a5c; }
#screen-reader.night-mode .reader-footer button { color: #999; }
#screen-reader.night-mode .reader-footer button + button { border-left-color: #2a3a5c; }
#screen-reader.night-mode .reader-content .text { color: #d1d1d6; }
#screen-reader.night-mode .reader-content .text.show-sep::before { color: #e0e0e0; }
#screen-reader.night-mode .reader-content .text.show-sep::after { color: #666; }
#screen-reader.night-mode .reader-nav .nav-btn { border-color: #2a3a5c; background: #0f3460; color: #999; }
#screen-reader.night-mode .reader-nav .nav-btn:active { background: #1a2a4a; }

.night-toggle-fixed {
  position: fixed;
  right: 6px;
  bottom: 54px;
  z-index: 9;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #e8e8ec;
  border: none;
  cursor: pointer;
  padding: 0;
  color: #3c3c43;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  transition: opacity 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reader-controls-hidden .night-toggle-fixed {
  opacity: 0;
  pointer-events: none;
}
#screen-reader.night-mode .night-toggle-fixed {
  background: #0f3460;
  color: #e0e0e0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.history-lock { display: none; position: fixed; inset: 0; z-index: 999; align-items: center; justify-content: center; background: #1a1a2e; }
.history-lock.active { display: flex; }
.lock-box { text-align: center; }

.lock-box input { width: 180px; padding: 14px; border: 1px solid #2a3a5c; border-radius: 8px; background: #0f3460; color: #eee; font-size: 28px; text-align: center; letter-spacing: 10px; }
.lock-box input:focus { border-color: #e74c3c; }
.lock-error { color: #e74c3c; font-size: 14px; margin-top: 12px; display: none; }
</style>
</head>
<body>

<div class="screen-center" id="screen-login">
  <div class="login-box">
    <h1><span>Reader</span></h1>
    <div class="error" id="loginError"></div>
    <form id="loginForm">
      <label>用户名</label>
      <input type="text" id="loginUsername" value="admin" autocomplete="username">
      <label>密码</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
      <button type="submit">登录</button>
    </form>
  </div>
</div>

<div id="historyLock" class="history-lock">
  <div class="lock-box">
    <input type="tel" id="lockInput" maxlength="4" inputmode="numeric" autocomplete="off" placeholder="PIN">
    <div class="lock-error" id="lockError">密码错误</div>
  </div>
</div>

<div class="screen" id="screen-history">
  <div class="history-header">
    <h2 id="historyTitle">阅读历史</h2>
    <button class="logout-btn" onclick="mobileLogout()">退出</button>
  </div>
  <div class="history-input">
    <select id="mobileSiteSelect"></select>
    <input type="text" id="mobileNovelId" placeholder="输入小说ID" onkeydown="if(event.key==='Enter')loadNovel()">
    <button onclick="loadNovel()">搜索</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="loading">加载中...</div>
  </div>
</div>

<div class="screen" id="screen-chapters">
  <div class="chapter-header">
    <button class="back-btn" onclick="showScreen('screen-history')">←</button>
    <h2 id="chapterTitle">章节列表</h2>
  </div>
  <div class="chapter-list" id="chapterList"></div>
</div>

<div class="screen" id="screen-reader">
  <div class="reader-header">
    <button class="back-btn" onclick="backToHistory()">←</button>
    <span class="chap-title" id="readerChapTitle"></span>
  </div>
  <div class="reader-content" id="readerContent">
    <div class="text" id="readerText"></div>
    <div class="reader-nav" id="readerNav" style="display:none">
      <button class="nav-btn" onclick="prevChapter()">← 上一章</button>
      <button class="nav-btn" onclick="nextChapter()">下一章 →</button>
    </div>
  </div>
  <div class="reader-footer">
    <button onclick="prevChapter()">上一章</button>
    <button onclick="showMobileChapterOverlay()">目录</button>
    <button onclick="nextChapter()">下一章</button>
  </div>
  <button class="night-toggle-fixed" onclick="toggleNightMode()">
    <svg id="nightToggleIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
      <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-5.4-5.4c0-2.1 1.2-3.93 2.96-4.8A8.8 8.8 0 0 0 12 3z"/>
    </svg>
  </button>
</div>

<div class="chapter-overlay" id="chapterOverlay">
  <div class="overlay-header">
    <h3>章节列表</h3>
    <button class="close-btn" onclick="hideMobileChapterOverlay()">✕</button>
  </div>
  <div class="overlay-list" id="chapterOverlayList"></div>
</div>

<script>
const STATE = {
  site: "",
  novelId: "",
  novelTitle: "",
  chapters: [],
  currentChapIdx: 0,
  preloadedIdx: -1,
  preloadedContent: null,
};

const SITE_API = {
  "alicesw.com": "/api/alicesw",
  "biquge": "/api/biquge",
};

const SITE_NAMES = {};

function showScreen(id) {
  document.querySelectorAll(".screen, .screen-center").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  const lock = document.getElementById("historyLock");
  if (id === "screen-history") {
    lock.classList.add("active");
    document.getElementById("lockInput").value = "";
    document.getElementById("lockError").style.display = "none";
    setTimeout(() => document.getElementById("lockInput").focus(), 100);
  } else {
    lock.classList.remove("active");
  }
}

function doUnlock() {
  const val = document.getElementById("lockInput").value;
  if (val === "2356") {
    document.getElementById("historyLock").classList.remove("active");
  } else {
    document.getElementById("lockError").style.display = "block";
    document.getElementById("lockInput").value = "";
    document.getElementById("lockInput").focus();
  }
}

function toggleNightMode() {
  const reader = document.getElementById("screen-reader");
  reader.classList.toggle("night-mode");
  const isNight = reader.classList.contains("night-mode");
  localStorage.setItem("nightMode", isNight ? "1" : "");
  document.getElementById("nightToggleIcon").innerHTML = isNight
    ? `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>`
    : `<path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-5.4-5.4c0-2.1 1.2-3.93 2.96-4.8A8.8 8.8 0 0 0 12 3z"/>`;
}

async function api(url, opts) {
  if (!opts) opts = {};
  if (!opts.method) opts.method = "GET";
  const skipAuth = opts.skipAuth || false;
  delete opts.skipAuth;
  opts.headers = { "Content-Type": "application/json" };
  if (opts.body && typeof opts.body === "object") opts.body = JSON.stringify(opts.body);
  const res = await fetch(url, opts);
  if (res.status === 401 && !skipAuth) {
    showScreen("screen-login");
    return;
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "请求失败");
  return data;
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function formatTime(t) {
  if (!t) return "";
  const d = new Date(t);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function cacheChapter(site, url, content) {
  try { localStorage.setItem("c_" + site + "_" + url, content) } catch (e) {}
}
function getCachedChapter(site, url) {
  try { return localStorage.getItem("c_" + site + "_" + url) || null } catch (e) { return null }
}

document.getElementById("loginForm").onsubmit = async function(e) {
  e.preventDefault();
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  if (!username || !password) {
    errEl.textContent = "请输入用户名和密码";
    errEl.style.display = "block";
    return;
  }
  try {
    const data = await api("/api/login", { method: "POST", body: { username, password } });
    if (data && data.ok) {
      STATE.site = "alicesw.com";
      await loadSitesAndHistory();
      showScreen("screen-history");
    } else {
      errEl.textContent = (data && data.error) || "登录失败";
      errEl.style.display = "block";
    }
  } catch (e) {
    errEl.textContent = "网络错误";
    errEl.style.display = "block";
  }
};

async function loadSitesAndHistory() {
  try {
    const sites = await api("/api/sites");
    const sel = document.getElementById("mobileSiteSelect");
    sel.innerHTML = "";
    for (const s of sites) {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.name;
      sel.appendChild(opt);
      SITE_NAMES[s.id] = s.name;
    }
    sel.value = STATE.site;
    sel.onchange = () => { STATE.site = sel.value; };
  } catch (e) {}
  await loadHistory();
}

async function loadHistory() {
  try {
    const history = await api("/api/history");
    if (!history) return;
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">暂无阅读历史</div>';
      return;
    }
    for (const h of history) {
      const d = document.createElement("div");
      d.className = "history-item";
      const siteName = SITE_NAMES[h.site] || h.site;
      d.innerHTML = `<div class="info">
        <div class="title">${escHtml(h.novel_title)}</div>
        <div class="meta">${escHtml(siteName)} · ${escHtml(h.chapter_title || '')} · ${formatTime(h.updated_at)}</div>
      </div>`;
      d.addEventListener("click", () => resumeHistory(h));
      list.appendChild(d);
    }
  } catch (e) {
    document.getElementById("historyList").innerHTML = '<div class="history-empty">加载历史失败</div>';
  }
}

async function resumeHistory(h) {
  STATE.site = h.site;
  STATE.novelId = h.novel_id;
  STATE.novelTitle = h.novel_title;
  showScreen("screen-reader");
  document.getElementById("readerChapTitle").textContent = h.chapter_title || "...";

  const textEl = document.getElementById("readerText");
  const cachedContent = getCachedChapter(h.site, h.chapter_url);

  if (cachedContent) {
    textEl.textContent = cachedContent;
    textEl.classList.add("show-sep");
    textEl.setAttribute("data-title", h.chapter_title || "");
    document.getElementById("readerNav").style.display = "flex";
  } else {
    textEl.textContent = "获取中...";
    textEl.classList.remove("show-sep");
    textEl.removeAttribute("data-title");
    document.getElementById("readerNav").style.display = "none";
  }

  try {
    const data = await api(SITE_API[h.site] + "/novel/load", { method: "POST", body: { novel_id: h.novel_id } });
    if (!data) return;
    STATE.chapters = data.chapters || [];
    const chapIdx = STATE.chapters.findIndex(c => c.url === h.chapter_url);
    STATE.currentChapIdx = chapIdx >= 0 ? chapIdx : 0;
    const ch = STATE.chapters[STATE.currentChapIdx];
    if (!ch) return;

    document.getElementById("readerChapTitle").textContent = ch.title;

    if (cachedContent) {
      textEl.setAttribute("data-title", ch.title);
      saveMobileProgress();
      preloadNextMobileChapter(STATE.currentChapIdx + 1);
      buildMobileChapterOverlay();
    } else {
      await loadMobileChapter(STATE.currentChapIdx);
    }
  } catch (e) {
    if (!cachedContent) alert("加载失败: " + e.message);
  }
}

async function loadNovel(novelId) {
  const id = novelId || document.getElementById("mobileNovelId").value.trim();
  if (!id) return;
  STATE.novelId = id;
  try {
    const data = await api(SITE_API[STATE.site] + "/novel/load", { method: "POST", body: { novel_id: id } });
    if (!data) return;
    STATE.chapters = data.chapters || [];
    STATE.novelTitle = data.info.title || id;
    document.getElementById("chapterTitle").textContent = STATE.novelTitle;
    showChapters();
  } catch (e) {
    alert("加载失败: " + e.message);
  }
}

function showChapters() {
  showScreen("screen-chapters");
  const list = document.getElementById("chapterList");
  list.innerHTML = "";
  for (let i = 0; i < STATE.chapters.length; i++) {
    const item = document.createElement("div");
    item.className = "chapter-item";
    item.textContent = STATE.chapters[i].title;
    item.addEventListener("click", () => {
      STATE.currentChapIdx = i;
      loadMobileChapter(i);
    });
    list.appendChild(item);
  }
}

async function loadMobileChapter(idx) {
  if (idx < 0 || idx >= STATE.chapters.length) return;
  STATE.currentChapIdx = idx;
  const ch = STATE.chapters[idx];
  showScreen("screen-reader");
  document.getElementById("readerChapTitle").textContent = ch.title;
  const textEl = document.getElementById("readerText");
  textEl.textContent = ((idx === STATE.preloadedIdx && STATE.preloadedContent) || getCachedChapter(STATE.site, ch.url)) ? "恢复中..." : "获取中...";
  textEl.classList.remove("show-sep");
  textEl.removeAttribute("data-title");
  document.getElementById("readerNav").style.display = "none";

  if (idx === STATE.preloadedIdx && STATE.preloadedContent) {
    const cached = STATE.preloadedContent;
    STATE.preloadedIdx = -1;
    STATE.preloadedContent = null;
    textEl.textContent = cached;
    textEl.setAttribute("data-title", STATE.chapters[idx].title);
    textEl.classList.add("show-sep");
    document.getElementById("readerNav").style.display = "flex";
    cacheChapter(STATE.site, STATE.chapters[idx].url, cached);
    window.scrollTo(0, 0);
    saveMobileProgress();
    preloadNextMobileChapter(idx + 1);
    buildMobileChapterOverlay();
    return;
  }

  const cached = getCachedChapter(STATE.site, ch.url);
  if (cached) {
    textEl.textContent = cached;
    textEl.setAttribute("data-title", ch.title);
    textEl.classList.add("show-sep");
    document.getElementById("readerNav").style.display = "flex";
    window.scrollTo(0, 0);
    saveMobileProgress();
    preloadNextMobileChapter(idx + 1);
    buildMobileChapterOverlay();
    return;
  }

  try {
    const data = await api(SITE_API[STATE.site] + "/chapter/load", { method: "POST", body: { chapter_url: ch.url } });
    if (!data) return;
    textEl.textContent = data.content || "章节内容为空";
    textEl.setAttribute("data-title", ch.title);
    textEl.classList.add("show-sep");
    document.getElementById("readerNav").style.display = "flex";
    cacheChapter(STATE.site, ch.url, data.content || "");
    window.scrollTo(0, 0);
    saveMobileProgress();
    preloadNextMobileChapter(idx + 1);
    buildMobileChapterOverlay();
  } catch (e) {
    textEl.textContent = "加载失败: " + e.message;
  }
}

function preloadNextMobileChapter(idx) {
  if (idx < 0 || idx >= STATE.chapters.length) return;
  const ch = STATE.chapters[idx];
  api(SITE_API[STATE.site] + "/chapter/load", { method: "POST", body: { chapter_url: ch.url }, skipAuth: true })
    .then(data => {
      if (data) {
        STATE.preloadedIdx = idx;
        STATE.preloadedContent = data.content || "";
        cacheChapter(STATE.site, ch.url, data.content || "");
      }
    })
    .catch(() => {});
}

function nextChapter() {
  if (STATE.currentChapIdx < STATE.chapters.length - 1) {
    loadMobileChapter(STATE.currentChapIdx + 1);
  }
}

function prevChapter() {
  if (STATE.currentChapIdx > 0) {
    loadMobileChapter(STATE.currentChapIdx - 1);
  }
}

function backToHistory() {
  showScreen("screen-history");
  loadHistory();
}

function showMobileChapterOverlay() {
  document.getElementById("chapterOverlay").classList.add("active");
}

function hideMobileChapterOverlay() {
  document.getElementById("chapterOverlay").classList.remove("active");
}

function buildMobileChapterOverlay() {
  const list = document.getElementById("chapterOverlayList");
  list.innerHTML = "";
  for (let i = 0; i < STATE.chapters.length; i++) {
    const item = document.createElement("div");
    item.className = "overlay-item" + (i === STATE.currentChapIdx ? " active" : "");
    item.textContent = STATE.chapters[i].title;
    item.addEventListener("click", () => {
      hideMobileChapterOverlay();
      STATE.currentChapIdx = i;
      loadMobileChapter(i);
    });
    list.appendChild(item);
  }
}

function saveMobileProgress() {
  const ch = STATE.chapters[STATE.currentChapIdx];
  if (!ch) return;
  api("/api/history/save", { method: "POST", body: {
    site: STATE.site,
    novel_id: STATE.novelId,
    novel_title: STATE.novelTitle,
    chapter_url: ch.url,
    chapter_title: ch.title,
    page: 1,
    total_pages: STATE.chapters.length
  } }).catch(() => {});
}

function mobileLogout() {
  api("/api/logout", { method: "POST" }).then(() => {
    showScreen("screen-login");
  }).catch(() => {});
}

async function init() {
  try {
    const sites = await api("/api/sites");
    if (!sites) return;
    const sel = document.getElementById("mobileSiteSelect");
    sel.innerHTML = "";
    for (const s of sites) {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.name;
      sel.appendChild(opt);
      SITE_NAMES[s.id] = s.name;
    }
    STATE.site = sel.value;
    sel.onchange = () => { STATE.site = sel.value; };
    showScreen("screen-history");
    loadHistory();
  } catch (e) {
    showScreen("screen-login");
  }
  document.getElementById("readerContent").addEventListener("click", function() {
    document.getElementById("screen-reader").classList.toggle("reader-controls-hidden");
  });
  window.addEventListener("scroll", function() {
    if (!document.getElementById("screen-reader").classList.contains("active")) return;
    document.getElementById("screen-reader").classList.add("reader-controls-hidden");
  });
  if (localStorage.getItem("nightMode")) {
    document.getElementById("screen-reader").classList.add("night-mode");
    document.getElementById("nightToggleIcon").innerHTML = `<path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>`;
  }
}

init();

document.getElementById("lockInput").addEventListener("input", function() {
  if (this.value.length === 4) doUnlock();
});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Noto Sans SC", "Microsoft YaHei", sans-serif; background: #f6f6f7; color: #3c3c43; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

.welcome-text { font-size: 28px; color: #3c3c43; cursor: pointer; user-select: none; transition: opacity 0.5s, transform 0.5s; letter-spacing: 1px; }
.welcome-text:hover { opacity: 0.7; }
.welcome-text.fade { opacity: 0; transform: scale(0.9); pointer-events: none; }

.login-box { position: absolute; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s; pointer-events: none; }
.login-box.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.login-box h1 { text-align: center; margin-bottom: 24px; font-size: 24px; color: #3c3c43; font-weight: 600; }
.login-box h1 span { color: #e74c3c; }
.login-box label { display: block; margin-bottom: 6px; font-size: 13px; color: #8a8a8f; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d6; border-radius: 6px; background: #f6f6f7; color: #3c3c43; font-size: 15px; outline: none; margin-bottom: 18px; transition: border 0.2s; }
.login-box input:focus { border-color: #e74c3c; }
.login-box button { width: 100%; padding: 12px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
.login-box button:hover { background: #c0392b; }
.login-box .error { color: #e74c3c; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="welcome-text" id="welcomeText">Welcome OpenCode Reader</div>
<div class="login-box" id="loginBox">
  <h1><span>Reader</span></h1>
  <div class="error" id="error"></div>
  <form id="loginForm">
    <label for="username">用户名</label>
    <input type="text" id="username" value="admin" autocomplete="username">
    <label for="password">密码</label>
    <input type="password" id="password" autocomplete="current-password">
    <button type="submit">登录</button>
  </form>
</div>
<script>
document.getElementById("welcomeText").onclick = function() {
  this.classList.add("fade");
  document.getElementById("loginBox").classList.add("show");
};

document.getElementById("loginForm").onsubmit = async function(e) {
  e.preventDefault();
  const errEl = document.getElementById("error");
  errEl.style.display = "none";
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) {
    errEl.textContent = "请输入用户名和密码";
    errEl.style.display = "block";
    return;
  }
  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = "/";
    } else {
      errEl.textContent = data.error || "登录失败";
      errEl.style.display = "block";
    }
  } catch (e) {
    errEl.textContent = "网络错误";
    errEl.style.display = "block";
  }
};
</script>
</body>
</html>
